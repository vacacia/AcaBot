# AcaBot + NapCat 运行环境
#
# 生产模式:
#   cd deploy && cp .env.example .env && docker compose up -d --build
#
# 开发模式:
#   cd deploy && docker compose -f compose.yaml -f compose.dev.yaml up

services:
  acabot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: acabot
    restart: unless-stopped
    ports:
      - "${ACABOT_PORT:-8080}:8080"
      - "${ACABOT_WEBUI_PORT:-8765}:8765"
    volumes:
      - ../config.yaml:/app/config.yaml
      - ../.env:/app/.env:ro
      - ../runtime_config:/app/runtime_config
      - ../runtime_data:/app/runtime_data
      - ../extensions:/app/extensions
    environment:
      - TZ=Asia/Shanghai
      - ACABOT_CONFIG=/app/config.yaml
    networks:
      - acabot_network

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: acabot-napcat
    restart: unless-stopped
    ports:
      - "${NAPCAT_WEBUI_PORT:-6100}:6099"
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/QQ:/app/.config/QQ
    networks:
      - acabot_network

networks:
  acabot_network:
    driver: bridge

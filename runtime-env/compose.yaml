# AcaBot + NapCat 运行环境
#
# 使用方法:
#   1. 进入 runtime-env/
#   2. 复制 .env.example -> .env
#   3. 复制 config.example.yaml -> config.yaml
#   4. 准备 runtime-config/ 与 runtime-data/
#   5. docker compose up -d --build

services:
  acabot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: acabot
    restart: unless-stopped
    ports:
      - "${ACABOT_PORT:-8080}:8080"
      - "${ACABOT_WEBUI_PORT:-8765}:8765"
    volumes:
      - ./config.yaml:/app/runtime-env/config.yaml
      - ./.env:/app/.env:ro
      - ./runtime-config:/app/runtime-env/runtime-config
      - ./runtime-data:/app/runtime-env/runtime-data
      - ../src:/app/src
      - ../plugins:/app/plugins
    environment:
      - TZ=Asia/Shanghai
      - ACABOT_CONFIG=/app/runtime-env/config.yaml
    networks:
      - acabot_network

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: acabot-napcat
    restart: unless-stopped
    ports:
      - "${NAPCAT_WEBUI_PORT:-6099}:6099"
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/QQ:/app/.config/QQ
    networks:
      - acabot_network

networks:
  acabot_network:
    driver: bridge

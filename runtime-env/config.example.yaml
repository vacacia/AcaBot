# 复制为 config.yaml 后修改

# --- Gateway ---
gateway:
  host: "0.0.0.0"
  port: 8080
  timeout: 10.0

# --- Agent ---
agent:
  max_tool_rounds: 30

# --- Runtime ---
runtime:
  default_agent_id: "aca"

  persistence:
    sqlite_path: "runtime-data/db/acabot-runtime.db"

  prompt_assembly:
    history_max_messages: 24
    keep_recent_messages: 12
    summary_slot_position: "history_prefix"
    sticky_slot_position: "system_message"
    retrieval_slot_position: "system_message"
    sticky_message_role: "system"
    summary_message_role: "user"
    retrieval_message_role: "system"

  context_compaction:
    enabled: true
    strategy: "summarize"
    max_context_ratio: 0.7
    preserve_recent: 10
    summary_max_chars: 1200
    system_prompt_reserve_tokens: 800
    prompt_slot_reserve_tokens: 1200
    tool_schema_reserve_tokens: 800

  computer:
    backend: "host"

  plugins:
    - "acabot.runtime.plugins.ops_control:OpsControlPlugin"

  webui:
    enabled: true
    host: "0.0.0.0"
    port: 8765
    cors_origins:
      - "http://127.0.0.1:5173"
      - "http://localhost:5173"

  filesystem:
    enabled: true
    base_dir: "."
    profiles_dir: "runtime-config/profiles"
    prompts_dir: "runtime-config/prompts"
    bindings_dir: "runtime-config/bindings"
    inbound_rules_dir: "runtime-config/inbound_rules"
    event_policies_dir: "runtime-config/event_policies"
    model_providers_dir: "runtime-config/models/providers"
    model_presets_dir: "runtime-config/models/presets"
    model_bindings_dir: "runtime-config/models/bindings"
    computer_root_dir: "runtime-data/workspaces"

  # 可选: reference / notebook backend
  # reference:
  #   enabled: true
  #   provider: "local"
  #   local:
  #     sqlite_path: "runtime-data/reference.sqlite3"

# --- Runtime plugin config ---
plugins:
  ops_control:
    prefix: "/"
    allowed_actor_ids:
      - "qq:user:10001"

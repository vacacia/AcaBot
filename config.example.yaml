# AcaBot 配置
# 复制为 config.yaml 后修改

# --- Gateway ---
gateway:
  host: "0.0.0.0"
  port: 8080
  timeout: 10.0

# --- Agent ---
agent:
  max_tool_rounds: 30

# --- Runtime ---
runtime:
  persistence:
    sqlite_path: "db/acabot.db"

  prompt_assembly:
    history_max_messages: 24
    keep_recent_messages: 12
    summary_slot_position: "history_prefix"
    sticky_slot_position: "system_message"
    retrieval_slot_position: "system_message"
    sticky_message_role: "system"
    summary_message_role: "user"
    retrieval_message_role: "system"

  context_compaction:
    enabled: true
    strategy: "summarize"
    max_context_ratio: 0.7
    preserve_recent: 10
    summary_max_chars: 1200
    system_prompt_reserve_tokens: 800
    prompt_slot_reserve_tokens: 1200
    tool_schema_reserve_tokens: 800

  computer:
    backend: "host"

  long_term_memory:
    enabled: false
    # backup:
    #   enabled: true
    #   interval_hours: 24
    #   max_backups: 5
    #   backup_dir: "long_term_memory/backups"

  plugins:
    - "acabot.runtime.plugins.ops_control:OpsControlPlugin"

  webui:
    enabled: true
    host: "127.0.0.1"
    port: 8765
    cors_origins:
      - "http://127.0.0.1:5173"
      - "http://localhost:5173"

  # Filesystem 配置真源（唯一模式）
  filesystem:
    base_dir: "runtime_config"
    sessions_dir: "sessions"
    prompts_dir: "prompts"
    model_providers_dir: "models/providers"
    model_presets_dir: "models/presets"
    model_bindings_dir: "models/bindings"

# --- Runtime plugin config ---
plugins:
  ops_control:
    prefix: "/"
    allowed_actor_ids:
      - "qq:user:10001"

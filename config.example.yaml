
# 复制为 config.yaml 后修改

# --- Gateway (NapCat WebSocket 服务) ---
gateway:
  host: "0.0.0.0"       # 监听地址
  port: 8080             # 监听端口
  timeout: 10.0          # 发送/API 调用超时(秒)

# --- Agent (LLM 调用) ---
agent:
  default_model: "gpt-4o-mini"   # 默认模型
  max_tool_rounds: 5             # 最大 tool 调用轮次
  system_prompt: "you are a helpful assistant."

# --- Session ---
session:
  max_messages: 20       # 每个会话保留的最大消息数

# --- Pipeline ---
pipeline:
  error_reply: "出了点问题, 请稍后再试"  # Agent 出错时的回复, 留空则不回复

# --- 日志 ---
logging:
  level: "INFO"          # DEBUG / INFO / WARNING / ERROR

# --- 插件配置 ---
# plugins:
#   plugin_name:
#     key: value

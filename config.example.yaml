
# 复制为 config.yaml 后修改

# --- Gateway (NapCat WebSocket 服务) ---
gateway:
  host: "0.0.0.0"       # 监听地址
  port: 8080             # 监听端口
  timeout: 10.0          # 发送/API 调用超时(秒)

# --- Agent (LLM 调用) ---
agent:
  default_model: "deepseek-chat"   # 默认模型
  max_tool_rounds: 30             # 最大 tool 调用轮次
  system_prompt: "you are a helpful assistant."

# --- Session ---
session:
  max_messages: 20       # 每个会话保留的最大消息数

# --- Pipeline ---
pipeline:
  error_reply: "出了点问题, 请稍后再试"  # Agent 出错时的回复, 留空则不回复

# --- 消息存储 ---
store:
  db_path: "data/db/acabot.db"  # SQLite 数据库路径, 目录不存在会自动创建

# --- 内置 Hook ---
hooks:
  # 多模态预处理 — 图片/表情/语音/视频 → 文字描述
  multimodal:
    enabled: true
    vision_model: ""   # 图片转述模型, 留空则图片只占位不描述

  # 上下文压缩 — LLM 调用前裁剪过长的对话
  context_compress:
    enabled: true
    strategy: "truncate"       # "truncate"(砍旧消息) 或 "summarize"(LLM 摘要, 暂未实现)
    max_context_ratio: 0.7     # 模型上下文窗口的可用比例(剩余留给 response)
    preserve_recent: 10        # 至少保留最近 N 轮

# --- 日志 ---
logging:
  level: "INFO"          # DEBUG / INFO / WARNING / ERROR

# --- 插件配置 ---
plugins:
  napcat_tools:
    # 启用的工具列表, 留空则注册全部
    enabled_tools:
      - get_user_info
      - get_group_info
      - get_group_member_info
      - get_group_member_list
      - get_message
    # 后续可加操作类: group_ban, group_kick, recall 等

# 复制为 config.yaml 后修改

# --- Gateway ---
gateway:
  host: "0.0.0.0"
  port: 8080
  timeout: 10.0

# --- Agent ---
agent:
  default_model: "openai/gemini-3-flash-preview"
  max_tool_rounds: 30

# --- Runtime ---
runtime:
  default_agent_id: "aca"

  # 最小 profile 定义. 后续也可以改成 filesystem layout.
  profiles:
    aca:
      name: "Aca"
      prompt_ref: "prompt/default"
      default_model: "openai/gemini-3-flash-preview"
      enabled_tools: []

  prompts:
    prompt/default: |
      you are a helpful assistant.

  persistence:
    sqlite_path: "data/db/acabot-runtime.db"

  prompt_assembly:
    history_max_messages: 24
    keep_recent_messages: 12
    summary_slot_position: "history_prefix"
    sticky_slot_position: "system_message"
    retrieval_slot_position: "system_message"
    sticky_message_role: "system"
    summary_message_role: "user"
    retrieval_message_role: "system"

  context_compaction:
    enabled: true
    strategy: "summarize"
    max_context_ratio: 0.7
    preserve_recent: 10
    summary_model: ""
    summary_max_chars: 1200
    system_prompt_reserve_tokens: 800
    prompt_slot_reserve_tokens: 1200
    tool_schema_reserve_tokens: 800

  # 最小静态 route. 需要更复杂配置时, 推荐改用 filesystem layout.
  binding_rules:
    - rule_id: "private-default"
      priority: 10
      match:
        channel_scope: "qq:user:10001"
      agent_id: "aca"

  inbound_rules:
    - rule_id: "private-respond"
      priority: 10
      match:
        platform: "qq"
        event_type: "message"
      run_mode: "respond"

  event_policies:
    - policy_id: "message-default"
      priority: 10
      match:
        platform: "qq"
        event_type: "message"
      persist_event: true
      extract_to_memory: true
      memory_scopes:
        - "episodic"

  plugins:
    - "acabot.runtime.plugins.ops_control:OpsControlPlugin"

  # 可选: 从 filesystem layout 读取 profiles / prompts / rules
  # filesystem:
  #   enabled: true
  #   base_dir: "."
  #   profiles_dir: "profiles"
  #   prompts_dir: "prompts"
  #   bindings_dir: "bindings"
  #   inbound_rules_dir: "inbound_rules"
  #   event_policies_dir: "event_policies"

  # 可选: reference / notebook backend
  # reference:
  #   enabled: true
  #   provider: "local"
  #   local:
  #     sqlite_path: "data/reference.sqlite3"

# --- Runtime plugin config ---
plugins:
  ops_control:
    prefix: "/"
    allowed_actor_ids:
      - "qq:user:10001"

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AcaBot WebUI</title>
    <script>
      (() => {
        const key = "acabot.theme_mode";
        const saved = localStorage.getItem(key);
        const mode = saved === "light" || saved === "dark" || saved === "system" ? saved : "dark";
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const effective = mode === "system" ? (systemDark ? "dark" : "light") : mode;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
    <style>
      html,
      body,
      #app {
        min-height: 100%;
      }

      html[data-theme="dark"] body {
        margin: 0;
        background: #0d0f14;
        color: #e4e5e9;
      }

      html[data-theme="light"] body {
        margin: 0;
        background: #f0f2f5;
        color: #1a1d23;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DRqfNmgp.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Ch0K1_yp.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>

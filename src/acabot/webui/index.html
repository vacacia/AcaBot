<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AcaBot WebUI</title>
    <script>
      (() => {
        const key = "acabot.theme_mode";
        const saved = localStorage.getItem(key);
        const mode = saved === "light" || saved === "dark" || saved === "system" ? saved : "dark";
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const effective = mode === "system" ? (systemDark ? "dark" : "light") : mode;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
    <style>
      html,
      body,
      #app {
        min-height: 100%;
      }

      html[data-theme="dark"] body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(15, 108, 184, 0.16), transparent 26%),
          radial-gradient(circle at 70% 20%, rgba(49, 98, 162, 0.1), transparent 26%),
          radial-gradient(circle at bottom right, rgba(242, 166, 90, 0.12), transparent 22%),
          linear-gradient(180deg, #07111d 0%, #0c1624 100%);
        color: #e6eef8;
      }

      html[data-theme="light"] body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(15, 108, 184, 0.16), transparent 26%),
          radial-gradient(circle at 70% 20%, rgba(49, 98, 162, 0.1), transparent 26%),
          radial-gradient(circle at bottom right, rgba(242, 166, 90, 0.12), transparent 22%),
          linear-gradient(180deg, #eff6ff 0%, #f7f4ec 100%);
        color: #132944;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DrPVUxQM.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DX7MVQoq.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
